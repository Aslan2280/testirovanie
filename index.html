<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RuEncryp · соцсеть</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 0 0 80px 0;
            color: #1a2634;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 16px 14px;
        }

        .header {
            background: white;
            padding: 14px 18px;
            border-bottom: 1px solid #e2e6ec;
            position: sticky;
            top: 0;
            z-index: 10;
            background: white;
        }
        .header-content {
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1e2a3e;
        }
        .header-sub {
            font-size: 0.75rem;
            color: #5b6e8c;
            margin-top: 4px;
        }
        .logout-btn, .profile-btn {
            background: none;
            border: 1px solid #d0d8e8;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-left: 8px;
        }
        .profile-btn {
            background: #3b82f6;
            color: white;
            border: none;
        }
        .logout-btn {
            color: #4a5b6e;
        }

        .post-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid #e7ecf3;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: #4a6fa5;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            flex-shrink: 0;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1e2a3e;
        }
        .user-bio {
            font-size: 0.7rem;
            color: #6c7a91;
            margin-top: 2px;
        }
        .post-time {
            font-size: 0.7rem;
            color: #7e8b9e;
            margin-top: 2px;
        }
        .post-text {
            font-size: 0.95rem;
            line-height: 1.45;
            margin: 12px 0;
            word-break: break-word;
            color: #2c3e44;
        }
        .post-actions {
            display: flex;
            gap: 24px;
            margin-top: 12px;
            border-top: 1px solid #edf2f8;
            padding-top: 12px;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a5b6e;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 40px;
        }
        .action-btn:active {
            background: #eef2f7;
        }
        .like-btn.liked {
            color: #c2412c;
        }
        .like-icon, .comment-icon {
            font-size: 1.35rem;
        }
        .comments-section {
            margin-top: 14px;
            background: #f9fbfd;
            border-radius: 18px;
            padding: 12px;
            border: 1px solid #eef2f8;
        }
        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid #e6edf4;
            font-size: 0.85rem;
            display: flex;
            gap: 10px;
        }
        .comment-name {
            font-weight: 600;
            min-width: 64px;
            color: #2c3e50;
        }
        .comment-text {
            color: #1e2a36;
            word-break: break-word;
            flex: 1;
        }
        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: center;
        }
        .comment-input {
            flex: 1;
            background: white;
            border: 1px solid #dce3ec;
            border-radius: 40px;
            padding: 10px 14px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .comment-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .send-comment {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }

        .new-post-panel {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        .new-post-text {
            width: 100%;
            border: 1px solid #dce3ec;
            border-radius: 28px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
        }
        .new-post-text:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .publish-btn {
            margin-top: 12px;
            background: #3b82f6;
            border: none;
            padding: 12px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
        }

        .auth-container, .profile-container {
            background: white;
            border-radius: 28px;
            padding: 24px 20px;
            margin-top: 20px;
            border: 1px solid #eef2f8;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #7e8b9e;
            cursor: pointer;
        }
        .auth-tab.active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }
        .auth-input, .profile-input, .profile-textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #dce3ec;
            border-radius: 28px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .profile-textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 80px;
        }
        .auth-btn, .profile-save-btn {
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 14px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        .error-msg, .success-msg {
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
        }
        .error-msg {
            color: #c2412c;
        }
        .success-msg {
            color: #06a06b;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #5b6e8c;
        }
        .hide {
            display: none;
        }
        .empty-feed {
            text-align: center;
            padding: 48px 20px;
            background: white;
            border-radius: 32px;
            color: #6c7a91;
            border: 1px solid #eef2f8;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8d9bb0;
            margin-top: 20px;
            padding-bottom: 12px;
        }
        .avatar-preview {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        .color-options {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-option.selected {
            border-color: #1e2a3e;
            transform: scale(1.1);
        }
        .avatar-emoji-input {
            text-align: center;
            font-size: 1.5rem;
            width: 80px;
            margin: 0 auto 16px;
            padding: 8px;
            border: 1px solid #dce3ec;
            border-radius: 40px;
            text-align: center;
        }
        .back-btn {
            background: none;
            border: none;
            color: #3b82f6;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 16px;
            display: inline-block;
        }
        .user-header-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .debug-info {
            background: #f0f0f0;
            padding: 10px;
            margin-bottom: 16px;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <div>
            <h1>RuEncryp</h1>
            <div class="header-sub">защищённая лента</div>
        </div>
        <div id="userHeaderInfo" class="user-header-info"></div>
    </div>
</div>

<div class="container" id="appContainer">
    <div id="authSection"></div>
    <div id="profileSection" class="hide"></div>
    <div id="feedSection" class="hide"></div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ SUPABASE ==========
    const SUPABASE_URL = 'https://bievejrvmctfbkpqiojr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpZXZlanJ2bWN0ZmJrcHFpb2pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODc1MDIsImV4cCI6MjA5MzY2MzUwMn0.kBm8R8iwTNAaGWFviQNyJcOGkKxtzlt3LaUsu0lNBC4';
    
    // Создаём клиент Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let currentProfile = null;
    let allPosts = [];
    let userLikesSet = new Set();
    let commentsMap = new Map();

    const authSection = document.getElementById('authSection');
    const profileSection = document.getElementById('profileSection');
    const feedSection = document.getElementById('feedSection');
    const userHeaderInfo = document.getElementById('userHeaderInfo');

    const avatarColors = ['#4a6fa5', '#e94560', '#48cae4', '#06d6a0', '#ffb703', '#8338ec', '#fb5607', '#3a86ff'];
    
    function formatTime(timestamp) {
        const diff = Date.now() - timestamp;
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (minutes < 1) return "только что";
        if (minutes < 60) return `${minutes} мин назад`;
        if (hours < 24) return `${hours} ч назад`;
        if (days === 1) return "вчера";
        return `${days} дн назад`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Проверка соединения с Supabase
    async function testSupabaseConnection() {
        try {
            const { data, error } = await supabase.from('posts').select('count', { count: 'exact', head: true });
            if (error) {
                console.error('Ошибка подключения к Supabase:', error);
                return false;
            }
            console.log('Подключение к Supabase успешно!');
            return true;
        } catch (err) {
            console.error('Исключение при подключении:', err);
            return false;
        }
    }

    // Загрузка профиля
    async function loadProfile(userId) {
        try {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .maybeSingle();
            
            if (error) {
                console.error('Ошибка загрузки профиля:', error);
                return {
                    id: userId,
                    name: currentUser?.email?.split('@')[0] || 'Пользователь',
                    avatar_color: '#4a6fa5',
                    avatar_symbol: '👤',
                    bio: ''
                };
            }
            
            if (data) return data;
            
            // Если профиля нет, возвращаем дефолтный (но не создаём)
            return {
                id: userId,
                name: currentUser?.email?.split('@')[0] || 'Пользователь',
                avatar_color: '#4a6fa5',
                avatar_symbol: '👤',
                bio: ''
            };
        } catch (err) {
            console.error('Исключение при загрузке профиля:', err);
            return {
                id: userId,
                name: currentUser?.email?.split('@')[0] || 'Пользователь',
                avatar_color: '#4a6fa5',
                avatar_symbol: '👤',
                bio: ''
            };
        }
    }

    // Сохранение профиля
    async function saveProfile(updates) {
        const { error } = await supabase
            .from('profiles')
            .upsert({ 
                id: currentUser.id, 
                ...updates,
                updated_at: new Date().toISOString()
            })
            .eq('id', currentUser.id);
        
        if (error) throw error;
        
        currentProfile = { ...currentProfile, ...updates };
        updateHeaderInfo();
        updateAllPostsAuthorInfo();
        return true;
    }

    function updateHeaderInfo() {
        if (currentUser && currentProfile) {
            userHeaderInfo.innerHTML = `
                <button id="profileBtn" class="profile-btn">👤</button>
                <button id="logoutBtnHeader" class="logout-btn">Выйти</button>
            `;
            const profileBtn = document.getElementById('profileBtn');
            const logoutBtn = document.getElementById('logoutBtnHeader');
            if (profileBtn) profileBtn.addEventListener('click', showProfileEditor);
            if (logoutBtn) logoutBtn.addEventListener('click', async () => {
                await supabase.auth.signOut();
                currentUser = null;
                renderAuth();
            });
        }
    }

    function updateAllPostsAuthorInfo() {
        document.querySelectorAll('.post-card').forEach(card => {
            if (card.dataset.authorId === currentUser.id) {
                const userNameSpan = card.querySelector('.user-name');
                const avatarDiv = card.querySelector('.avatar');
                const userBioSpan = card.querySelector('.user-bio');
                
                if (userNameSpan) userNameSpan.innerText = currentProfile.name;
                if (avatarDiv) {
                    avatarDiv.innerText = currentProfile.avatar_symbol || currentProfile.name.charAt(0).toUpperCase();
                    avatarDiv.style.background = currentProfile.avatar_color || '#4a6fa5';
                }
                if (userBioSpan && currentProfile.bio) {
                    userBioSpan.innerText = currentProfile.bio;
                }
            }
        });
    }

    function showProfileEditor() {
        feedSection.classList.add('hide');
        profileSection.classList.remove('hide');
        renderProfileEditor();
    }

    function renderProfileEditor() {
        profileSection.innerHTML = `
            <div class="profile-container">
                <button id="backToFeed" class="back-btn">← Назад к ленте</button>
                <h3 style="margin-bottom: 20px;">Редактировать профиль</h3>
                <div class="avatar-preview">
                    <div id="avatarPreview" class="avatar-large" style="background: ${currentProfile.avatar_color || '#4a6fa5'}">
                        ${escapeHtml(currentProfile.avatar_symbol || currentProfile.name?.charAt(0).toUpperCase() || '👤')}
                    </div>
                </div>
                <div class="color-options" id="colorOptions">
                    ${avatarColors.map(color => `
                        <div class="color-option ${currentProfile.avatar_color === color ? 'selected' : ''}" 
                             style="background: ${color}" data-color="${color}"></div>
                    `).join('')}
                </div>
                <input type="text" id="avatarSymbol" class="avatar-emoji-input" 
                       placeholder="Эмодзи или буква" maxlength="2" value="${escapeHtml(currentProfile.avatar_symbol || '')}">
                <input type="text" id="profileName" class="profile-input" 
                       placeholder="Имя" value="${escapeHtml(currentProfile.name || '')}">
                <textarea id="profileBio" class="profile-textarea" 
                          placeholder="О себе" rows="3">${escapeHtml(currentProfile.bio || '')}</textarea>
                <button id="saveProfileBtn" class="profile-save-btn">💾 Сохранить изменения</button>
                <div id="profileMessage" class="error-msg"></div>
            </div>
        `;
        
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                const color = opt.dataset.color;
                document.getElementById('avatarPreview').style.background = color;
            });
        });
        
        const symbolInput = document.getElementById('avatarSymbol');
        const avatarPreview = document.getElementById('avatarPreview');
        symbolInput.addEventListener('input', () => {
            let val = symbolInput.value;
            if (val.length > 2) val = val.slice(0, 2);
            avatarPreview.innerText = val || '👤';
        });
        
        const saveBtn = document.getElementById('saveProfileBtn');
        const messageDiv = document.getElementById('profileMessage');
        
        saveBtn.onclick = async () => {
            const selectedColor = document.querySelector('.color-option.selected')?.dataset.color || avatarColors[0];
            let symbol = document.getElementById('avatarSymbol').value.trim();
            if (!symbol) symbol = '👤';
            const name = document.getElementById('profileName').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            
            if (!name) {
                messageDiv.className = 'error-msg';
                messageDiv.innerText = '❌ Имя не может быть пустым';
                return;
            }
            
            messageDiv.className = 'error-msg';
            messageDiv.innerText = '⏳ Сохранение...';
            saveBtn.disabled = true;
            
            try {
                await saveProfile({
                    name: name,
                    avatar_color: selectedColor,
                    avatar_symbol: symbol,
                    bio: bio
                });
                messageDiv.className = 'success-msg';
                messageDiv.innerText = '✅ Профиль обновлён!';
                setTimeout(() => {
                    messageDiv.innerText = '';
                }, 2000);
            } catch (err) {
                messageDiv.className = 'error-msg';
                messageDiv.innerText = '❌ Ошибка: ' + err.message;
            } finally {
                saveBtn.disabled = false;
            }
        };
        
        document.getElementById('backToFeed').onclick = () => {
            profileSection.classList.add('hide');
            feedSection.classList.remove('hide');
            refreshAllPostsData();
        };
    }

    async function refreshAllPostsData() {
        await loadInitialFeed();
    }

    function updatePostInDOM(postId, updatedData) {
        const postElement = document.querySelector(`.post-card[data-post-id="${postId}"]`);
        if (!postElement) return;
        
        if (updatedData.likes_count !== undefined) {
            const likeCountSpan = postElement.querySelector('.like-count');
            if (likeCountSpan) likeCountSpan.innerText = updatedData.likes_count;
            const likeBtn = postElement.querySelector('.like-btn');
            const likeIcon = likeBtn?.querySelector('.like-icon');
            if (likeIcon) {
                const isLiked = userLikesSet.has(postId);
                likeIcon.innerText = isLiked ? '❤️' : '🤍';
                if (isLiked) likeBtn?.classList.add('liked');
                else likeBtn?.classList.remove('liked');
            }
        }
    }

    function addCommentToDOM(postId, comment) {
        const postElement = document.querySelector(`.post-card[data-post-id="${postId}"]`);
        if (!postElement) return;
        const commentsContainer = postElement.querySelector('.comments-container');
        if (commentsContainer) {
            const commentDiv = document.createElement('div');
            commentDiv.className = 'comment-item';
            commentDiv.innerHTML = `
                <div class="comment-name">${escapeHtml(comment.user_name || comment.user_email?.split('@')[0] || 'anon')}:</div>
                <div class="comment-text">${escapeHtml(comment.content)}</div>
            `;
            commentsContainer.appendChild(commentDiv);
            const commentCountSpan = postElement.querySelector('.comment-count');
            if (commentCountSpan) {
                commentCountSpan.innerText = (parseInt(commentCountSpan.innerText) || 0) + 1;
            }
        }
        const commentInput = postElement.querySelector('.comment-input');
        if (commentInput) commentInput.value = '';
    }

    function addPostToDOM(post) {
        const feedContainer = document.getElementById('dynamicFeed');
        if (!feedContainer) return;
        const postElement = createPostElement(post);
        feedContainer.insertBefore(postElement, feedContainer.firstChild);
    }

    function createPostElement(post) {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.dataset.postId = post.id;
        card.dataset.authorId = post.user_id;
        
        const commentsList = commentsMap.get(post.id) || [];
        let authorName = post.user_name;
        let authorAvatarSymbol = post.user_name?.[0] || 'U';
        let authorAvatarColor = '#4a6fa5';
        let authorBio = '';
        
        if (post.user_id === currentUser?.id && currentProfile) {
            authorName = currentProfile.name;
            authorAvatarSymbol = currentProfile.avatar_symbol || currentProfile.name?.charAt(0) || 'U';
            authorAvatarColor = currentProfile.avatar_color || '#4a6fa5';
            authorBio = currentProfile.bio || '';
        }
        
        card.innerHTML = `
            <div class="post-header">
                <div class="avatar" style="background: ${authorAvatarColor}">${escapeHtml(authorAvatarSymbol)}</div>
                <div class="user-info">
                    <div class="user-name">${escapeHtml(authorName)}</div>
                    ${authorBio ? `<div class="user-bio">${escapeHtml(authorBio)}</div>` : ''}
                    <div class="post-time">${formatTime(new Date(post.created_at).getTime())}</div>
                </div>
            </div>
            <div class="post-text">${escapeHtml(post.content)}</div>
            <div class="post-actions">
                <button class="action-btn like-btn ${userLikesSet.has(post.id) ? 'liked' : ''}">
                    <span class="like-icon">${userLikesSet.has(post.id) ? '❤️' : '🤍'}</span>
                    <span class="like-count">${post.likes_count || 0}</span>
                </button>
                <button class="action-btn comment-btn">
                    <span class="comment-icon">💬</span>
                    <span class="comment-count">${commentsList.length}</span>
                </button>
                ${post.user_id === currentUser?.id ? `<button class="action-btn delete-btn" style="margin-left: auto;">🗑️</button>` : ''}
            </div>
            <div class="comments-section">
                <div class="comments-container">
                    ${commentsList.map(comm => `
                        <div class="comment-item">
                            <div class="comment-name">${escapeHtml(comm.user_name || comm.user_email?.split('@')[0] || 'anon')}:</div>
                            <div class="comment-text">${escapeHtml(comm.content)}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="add-comment">
                    <input type="text" placeholder="Написать комментарий..." class="comment-input">
                    <button class="send-comment">Отправить</button>
                </div>
            </div>
        `;
        
        const likeBtn = card.querySelector('.like-btn');
        likeBtn.onclick = async () => {
            const isLiked = userLikesSet.has(post.id);
            if (isLiked) {
                await supabase.from('likes').delete().eq('post_id', post.id).eq('user_id', currentUser.id);
                userLikesSet.delete(post.id);
                post.likes_count = (post.likes_count || 1) - 1;
            } else {
                await supabase.from('likes').insert({ post_id: post.id, user_id: currentUser.id });
                userLikesSet.add(post.id);
                post.likes_count = (post.likes_count || 0) + 1;
            }
            updatePostInDOM(post.id, { likes_count: post.likes_count });
        };
        
        const sendBtn = card.querySelector('.send-comment');
        const commentInput = card.querySelector('.comment-input');
        sendBtn.onclick = async () => {
            const text = commentInput.value.trim();
            if (!text) return;
            const { data, error } = await supabase.from('comments').insert({
                post_id: post.id,
                user_id: currentUser.id,
                user_email: currentUser.email,
                user_name: currentProfile?.name || currentUser.email?.split('@')[0] || 'User',
                content: text,
                created_at: new Date().toISOString()
            }).select().single();
            if (!error && data) {
                if (!commentsMap.has(post.id)) commentsMap.set(post.id, []);
                commentsMap.get(post.id).push(data);
                addCommentToDOM(post.id, data);
            }
        };
        
        const deleteBtn = card.querySelector('.delete-btn');
        if (deleteBtn) {
            deleteBtn.onclick = async () => {
                if (confirm('Удалить пост?')) {
                    await supabase.from('posts').delete().eq('id', post.id);
                    card.remove();
                    allPosts = allPosts.filter(p => p.id !== post.id);
                }
            };
        }
        
        return card;
    }

    async function loadInitialFeed() {
        if (!currentUser) return;
        feedSection.innerHTML = '<div class="loading">📱 Загрузка ленты...</div>';
        
        const { data: posts, error } = await supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            feedSection.innerHTML = `<div class="empty-feed">❌ Ошибка загрузки: ${error.message}<br><br>Проверьте подключение к Supabase и наличие таблиц.</div>`;
            return;
        }
        
        allPosts = posts || [];
        
        const { data: userLikes } = await supabase
            .from('likes')
            .select('post_id')
            .eq('user_id', currentUser.id);
        userLikesSet = new Set(userLikes?.map(l => l.post_id) || []);
        
        const { data: allComments } = await supabase
            .from('comments')
            .select('*')
            .order('created_at', { ascending: true });
        
        commentsMap.clear();
        if (allComments) {
            for (const comm of allComments) {
                if (!commentsMap.has(comm.post_id)) commentsMap.set(comm.post_id, []);
                commentsMap.get(comm.post_id).push(comm);
            }
        }
        
        renderFeed();
    }
    
    function renderFeed() {
        const newPostPanel = document.createElement('div');
        newPostPanel.className = 'new-post-panel';
        newPostPanel.innerHTML = `
            <textarea class="new-post-text" rows="2" placeholder="Что нового? Напиши пост..."></textarea>
            <button class="publish-btn">📤 Опубликовать</button>
        `;
        
        const textarea = newPostPanel.querySelector('.new-post-text');
        const pubBtn = newPostPanel.querySelector('.publish-btn');
        pubBtn.onclick = async () => {
            const content = textarea.value.trim();
            if (!content) return;
            const { data, error } = await supabase.from('posts').insert({
                user_id: currentUser.id,
                user_email: currentUser.email,
                user_name: currentProfile?.name || currentUser.email?.split('@')[0] || 'Пользователь',
                content: content,
                created_at: new Date().toISOString(),
                likes_count: 0
            }).select().single();
            if (!error && data) {
                textarea.value = '';
                allPosts.unshift(data);
                commentsMap.set(data.id, []);
                addPostToDOM(data);
            } else {
                alert('Ошибка: ' + error?.message);
            }
        };
        
        const feedContainer = document.createElement('div');
        feedContainer.id = 'dynamicFeed';
        
        for (const post of allPosts) {
            feedContainer.appendChild(createPostElement(post));
        }
        
        feedSection.innerHTML = '';
        feedSection.appendChild(newPostPanel);
        feedSection.appendChild(feedContainer);
    }

    function renderAuth() {
        authSection.classList.remove('hide');
        feedSection.classList.add('hide');
        profileSection.classList.add('hide');
        userHeaderInfo.innerHTML = '';
        
        const container = document.createElement('div');
        container.className = 'auth-container';
        container.innerHTML = `
            <div class="auth-tabs">
                <button class="auth-tab active">Вход</button>
                <button class="auth-tab">Регистрация</button>
            </div>
            <div class="auth-form">
                <input type="email" class="auth-input" placeholder="Email">
                <input type="password" class="auth-input" placeholder="Пароль (мин. 6 символов)">
                <button class="auth-btn">Войти</button>
                <div class="error-msg"></div>
            </div>
        `;
        
        const loginTab = container.querySelector('.auth-tab');
        const regTab = container.querySelectorAll('.auth-tab')[1];
        const emailInput = container.querySelector('.auth-input');
        const passInput = container.querySelectorAll('.auth-input')[1];
        const submitBtn = container.querySelector('.auth-btn');
        const errorMsg = container.querySelector('.error-msg');
        
        let activeTab = 'login';
        
        loginTab.onclick = () => {
            loginTab.classList.add('active');
            regTab.classList.remove('active');
            submitBtn.innerText = 'Войти';
            activeTab = 'login';
            errorMsg.innerText = '';
            errorMsg.style.color = '#c2412c';
        };
        
        regTab.onclick = () => {
            regTab.classList.add('active');
            loginTab.classList.remove('active');
            submitBtn.innerText = 'Зарегистрироваться';
            activeTab = 'register';
            errorMsg.innerText = '';
            errorMsg.style.color = '#c2412c';
        };
        
        submitBtn.onclick = async () => {
            const email = emailInput.value.trim();
            const password = passInput.value;
            if (!email || !password) {
                errorMsg.innerText = 'Заполните все поля';
                return;
            }
            if (activeTab === 'register' && password.length < 6) {
                errorMsg.innerText = 'Пароль должен быть не менее 6 символов';
                return;
            }
            try {
                if (activeTab === 'register') {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    errorMsg.style.color = '#06a06b';
                    errorMsg.innerText = '✅ Регистрация успешна! Теперь войдите.';
                    emailInput.value = '';
                    passInput.value = '';
                    loginTab.click();
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    await checkUserAndLoad();
                }
            } catch (err) {
                errorMsg.style.color = '#c2412c';
                errorMsg.innerText = err.message || 'Ошибка авторизации';
            }
        };
        
        authSection.innerHTML = '';
        authSection.appendChild(container);
    }
    
    async function checkUserAndLoad() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            currentProfile = await loadProfile(user.id);
            updateHeaderInfo();
            authSection.classList.add('hide');
            profileSection.classList.add('hide');
            feedSection.classList.remove('hide');
            await loadInitialFeed();
        } else {
            currentUser = null;
            renderAuth();
        }
    }
    
    supabase.auth.onAuthStateChange(async (event) => {
        if (event === 'SIGNED_IN') {
            await checkUserAndLoad();
        } else if (event === 'SIGNED_OUT') {
            currentUser = null;
            renderAuth();
        }
    });
    
    // Запуск приложения
    testSupabaseConnection();
    checkUserAndLoad();
</script>
<footer class="container">RuEncryp · защищённая соцсеть</footer>
</body>
</html>
