<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RuEncryp · Лента + Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f2f4f8; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding-bottom: 80px; color: #1a2634; }
        .container { max-width: 550px; margin: 0 auto; padding: 16px 14px; }
        .header { background: white; padding: 14px 18px; border-bottom: 1px solid #e2e6ec; position: sticky; top: 0; z-index: 10; }
        .header-content { max-width: 550px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.7rem; font-weight: 700; color: #1e2a3e; }
        .header-sub { font-size: 0.75rem; color: #5b6e8c; margin-top: 4px; }
        .logout-btn { background: none; border: 1px solid #d0d8e8; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; color: #4a5b6e; }
        
        .tabs { display: flex; gap: 4px; background: white; padding: 8px 16px; border-bottom: 1px solid #e2e6ec; position: sticky; top: 70px; z-index: 9; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 1rem; font-weight: 600; color: #7e8b9e; cursor: pointer; border-radius: 30px; }
        .tab-btn.active { background: #3b82f6; color: white; }
        
        .post-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 18px; border: 1px solid #e7ecf3; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 44px; height: 44px; background: #4a6fa5; border-radius: 100px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.2rem; color: white; }
        .user-name { font-weight: 700; font-size: 1rem; }
        .post-time { font-size: 0.7rem; color: #7e8b9e; margin-top: 2px; }
        .post-text { font-size: 0.95rem; line-height: 1.45; margin: 12px 0; color: #2c3e44; }
        .post-actions { display: flex; gap: 24px; margin-top: 12px; border-top: 1px solid #edf2f8; padding-top: 12px; }
        .action-btn { background: none; border: none; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #4a5b6e; cursor: pointer; padding: 6px 10px; border-radius: 40px; }
        .like-btn.liked { color: #c2412c; }
        .new-post-panel { background: white; border-radius: 24px; padding: 16px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .new-post-text { width: 100%; border: 1px solid #dce3ec; border-radius: 28px; padding: 14px 18px; font-size: 0.95rem; resize: vertical; }
        .publish-btn { margin-top: 12px; background: #3b82f6; border: none; padding: 12px; border-radius: 44px; color: white; font-weight: 600; width: 100%; cursor: pointer; }
        
        .chats-list { background: white; border-radius: 20px; overflow: hidden; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #eef2f8; cursor: pointer; background: white; }
        .chat-item:active { background: #f5f7fb; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #4a6fa5; color: white; }
        .chat-name { font-weight: 700; font-size: 1rem; }
        .chat-type { font-size: 0.7rem; color: #7e8b9e; margin-top: 2px; }
        .messages-container { background: white; border-radius: 20px; padding: 16px; height: 55vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 20px; font-size: 0.9rem; }
        .message-own { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-other { background: #eef2f8; color: #1e2a3e; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-sender { font-size: 0.7rem; font-weight: 600; margin-bottom: 4px; }
        .message-time { font-size: 0.6rem; margin-top: 4px; opacity: 0.7; }
        .message-input-area { display: flex; gap: 10px; margin-top: 16px; background: white; padding: 12px; border-radius: 40px; border: 1px solid #e2e8f0; }
        .message-input { flex: 1; border: none; padding: 10px; font-size: 0.95rem; outline: none; }
        .send-message-btn { background: #3b82f6; border: none; color: white; padding: 8px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .new-chat-btn { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 30px; font-weight: 600; width: 100%; margin-bottom: 16px; cursor: pointer; }
        .chat-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: white; border-bottom: 1px solid #eef2f8; margin-bottom: 16px; }
        .back-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .hide { display: none; }
        .empty-feed, .empty-chats { text-align: center; padding: 48px 20px; background: white; border-radius: 32px; color: #6c7a91; }
        .loading { text-align: center; padding: 40px; color: #5b6e8c; }
        .auth-container { background: white; border-radius: 28px; padding: 24px 20px; margin-top: 20px; border: 1px solid #eef2f8; }
        .auth-tabs { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; background: none; border: none; font-size: 1rem; font-weight: 600; color: #7e8b9e; cursor: pointer; }
        .auth-tab.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #dce3ec; border-radius: 28px; font-size: 0.95rem; }
        .auth-btn { width: 100%; background: #3b82f6; border: none; padding: 14px; border-radius: 44px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; }
        .error-msg { color: #c2412c; font-size: 0.8rem; margin-top: 12px; text-align: center; }
        .debug-panel { background: #fff3cd; border: 1px solid #ffecb5; border-radius: 12px; padding: 12px; margin-bottom: 16px; font-size: 0.75rem; color: #856404; }
        footer { text-align: center; font-size: 0.7rem; color: #8d9bb0; margin-top: 20px; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <div><h1>RuEncryp</h1><div class="header-sub">лента + мессенджер</div></div>
        <div id="userHeaderInfo"></div>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" data-tab="feed">📰 Лента</button>
    <button class="tab-btn" data-tab="messenger">💬 Мессенджер</button>
</div>

<div class="container" id="appContainer">
    <div id="debugPanel" class="debug-panel" style="display: none;"></div>
    <div id="authSection"></div>
    <div id="feedSection" class="hide"></div>
    <div id="messengerSection" class="hide"></div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://bievejrvmctfbkpqiojr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpZXZlanJ2bWN0ZmJrcHFpb2pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODc1MDIsImV4cCI6MjA5MzY2MzUwMn0.kBm8R8iwTNAaGWFviQNyJcOGkKxtzlt3LaUsu0lNBC4';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let currentChat = null;
    let allPosts = [];
    
    const authSection = document.getElementById('authSection');
    const feedSection = document.getElementById('feedSection');
    const messengerSection = document.getElementById('messengerSection');
    const userHeaderInfo = document.getElementById('userHeaderInfo');
    const debugPanel = document.getElementById('debugPanel');
    
    function logDebug(msg) {
        console.log('[RuEncryp]', msg);
        debugPanel.style.display = 'block';
        debugPanel.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        setTimeout(() => {
            if (debugPanel.children.length > 5) debugPanel.removeChild(debugPanel.children[0]);
        }, 5000);
    }
    
    function formatTime(timestamp) {
        const diff = Date.now() - new Date(timestamp).getTime();
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return "только что";
        if (minutes < 60) return `${minutes} мин назад`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours} ч назад`;
        const days = Math.floor(hours / 24);
        if (days === 1) return "вчера";
        return `${days} дн назад`;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Табы
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (btn.dataset.tab === 'feed') {
                feedSection.classList.remove('hide');
                messengerSection.classList.add('hide');
                if (currentUser) loadFeed();
            } else {
                feedSection.classList.add('hide');
                messengerSection.classList.remove('hide');
                if (currentUser) loadChats();
            }
        });
    });
    
    // ========== ЛЕНТА ==========
    async function loadFeed() {
        if (!currentUser) return;
        feedSection.innerHTML = '<div class="loading">📱 Загрузка...</div>';
        
        const { data: posts, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
        if (error) {
            feedSection.innerHTML = `<div class="empty-feed">❌ ${error.message}</div>`;
            logDebug('Ошибка загрузки постов: ' + error.message);
            return;
        }
        allPosts = posts || [];
        renderFeed();
    }
    
    function renderFeed() {
        const newPostPanel = document.createElement('div');
        newPostPanel.className = 'new-post-panel';
        newPostPanel.innerHTML = `<textarea class="new-post-text" rows="2" placeholder="Что нового?"></textarea><button class="publish-btn">📤 Опубликовать</button>`;
        
        const textarea = newPostPanel.querySelector('.new-post-text');
        const pubBtn = newPostPanel.querySelector('.publish-btn');
        pubBtn.onclick = async () => {
            const content = textarea.value.trim();
            if (!content) return;
            const { error } = await supabase.from('posts').insert({
                user_id: currentUser.id,
                user_email: currentUser.email,
                user_name: currentUser.email?.split('@')[0],
                content: content,
                created_at: new Date().toISOString(),
                likes_count: 0
            });
            if (!error) {
                textarea.value = '';
                loadFeed();
                logDebug('Пост опубликован');
            } else {
                alert('Ошибка: ' + error.message);
            }
        };
        
        const feedContainer = document.createElement('div');
        for (const post of allPosts) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div class="post-header">
                    <div class="avatar">${escapeHtml((post.user_name?.[0] || 'U').toUpperCase())}</div>
                    <div>
                        <div class="user-name">${escapeHtml(post.user_name || post.user_email?.split('@')[0] || 'Аноним')}</div>
                        <div class="post-time">${formatTime(post.created_at)}</div>
                    </div>
                </div>
                <div class="post-text">${escapeHtml(post.content)}</div>
                <div class="post-actions">
                    <button class="action-btn like-btn"><span class="like-icon">🤍</span><span>${post.likes_count || 0}</span></button>
                </div>
            `;
            feedContainer.appendChild(card);
        }
        
        feedSection.innerHTML = '';
        feedSection.appendChild(newPostPanel);
        feedSection.appendChild(feedContainer);
    }
    
    // ========== МЕССЕНДЖЕР ==========
    async function loadChats() {
        if (!currentUser) return;
        messengerSection.innerHTML = '<div class="loading">💬 Загрузка чатов...</div>';
        
        // Проверяем существование таблиц
        const { error: testError } = await supabase.from('chats').select('id').limit(1);
        if (testError) {
            messengerSection.innerHTML = `<div class="empty-feed">⚠️ Таблицы чатов не найдены. Выполните SQL-скрипт в Supabase для создания таблиц.</div>`;
            logDebug('Ошибка: таблицы chats нет - ' + testError.message);
            return;
        }
        
        const { data: memberships, error } = await supabase
            .from('chat_members')
            .select('chat_id, chats(*)')
            .eq('user_id', currentUser.id);
        
        if (error) {
            messengerSection.innerHTML = `<div class="empty-feed">❌ ${error.message}</div>`;
            return;
        }
        
        const chatsList = memberships?.map(m => m.chats).filter(c => c) || [];
        
        const container = document.createElement('div');
        
        const newChatBtn = document.createElement('button');
        newChatBtn.className = 'new-chat-btn';
        newChatBtn.innerText = '+ Создать чат';
        newChatBtn.onclick = createNewChat;
        container.appendChild(newChatBtn);
        
        const chatsDiv = document.createElement('div');
        chatsDiv.className = 'chats-list';
        
        if (chatsList.length === 0) {
            chatsDiv.innerHTML = '<div class="empty-chats">😐 Нет чатов. Создайте первый!</div>';
        } else {
            for (const chat of chatsList) {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                chatItem.innerHTML = `
                    <div class="chat-avatar" style="background: ${chat.avatar_color || '#4a6fa5'}">${escapeHtml(chat.avatar_symbol || '💬')}</div>
                    <div>
                        <div class="chat-name">${escapeHtml(chat.name || (chat.type === 'private' ? 'Приватный чат' : 'Чат'))}</div>
                        <div class="chat-type">${chat.type === 'channel' ? '📢 Канал' : chat.type === 'group' ? '👥 Группа' : '🔒 Приват'}</div>
                    </div>
                `;
                chatItem.onclick = () => openChat(chat);
                chatsDiv.appendChild(chatItem);
            }
        }
        container.appendChild(chatsDiv);
        messengerSection.innerHTML = '';
        messengerSection.appendChild(container);
    }
    
    async function createNewChat() {
        const type = prompt('Тип чата:\n1 - private (личный)\n2 - group (группа)\n3 - channel (канал)', 'private');
        let chatType = 'private';
        if (type === '2') chatType = 'group';
        else if (type === '3') chatType = 'channel';
        
        let name = null;
        if (chatType !== 'private') {
            name = prompt('Название чата:');
            if (!name) return;
        }
        
        const { data: chat, error } = await supabase.from('chats').insert({
            type: chatType,
            name: name,
            created_by: currentUser.id,
            avatar_symbol: chatType === 'channel' ? '📢' : chatType === 'group' ? '👥' : '💬'
        }).select().single();
        
        if (error) {
            alert('Ошибка: ' + error.message);
            logDebug('Ошибка создания чата: ' + error.message);
            return;
        }
        
        // Добавляем создателя
        await supabase.from('chat_members').insert({ chat_id: chat.id, user_id: currentUser.id, role: 'admin' });
        
        if (chatType === 'private') {
            const otherEmail = prompt('Email пользователя для диалога:');
            if (otherEmail) {
                const { data: users } = await supabase.from('profiles').select('id').eq('email', otherEmail);
                if (users && users[0]) {
                    await supabase.from('chat_members').insert({ chat_id: chat.id, user_id: users[0].id, role: 'member' });
                } else {
                    alert('Пользователь не найден');
                }
            }
        }
        
        logDebug('Чат создан: ' + (chat.name || chat.id));
        loadChats();
    }
    
    async function openChat(chat) {
        currentChat = chat;
        messengerSection.innerHTML = `
            <div class="chat-header">
                <button class="back-btn" id="backToChats">←</button>
                <div class="chat-avatar" style="background: ${chat.avatar_color || '#4a6fa5'}">${escapeHtml(chat.avatar_symbol || '💬')}</div>
                <div><strong>${escapeHtml(chat.name || (chat.type === 'private' ? 'Приватный чат' : 'Чат'))}</strong><br><small>${chat.type}</small></div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
                <button class="send-message-btn" id="sendMsgBtn">📤</button>
            </div>
        `;
        
        document.getElementById('backToChats').onclick = () => {
            currentChat = null;
            loadChats();
        };
        
        await loadMessages(chat.id);
        
        document.getElementById('sendMsgBtn').onclick = () => sendMessage(chat.id);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage(chat.id);
        });
    }
    
    async function loadMessages(chatId) {
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .eq('chat_id', chatId)
            .order('created_at', { ascending: true });
        
        if (error) {
            logDebug('Ошибка загрузки сообщений: ' + error.message);
            return;
        }
        
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        
        container.innerHTML = '';
        for (const msg of data || []) {
            addMessageToDOM(msg);
        }
        container.scrollTop = container.scrollHeight;
    }
    
    function addMessageToDOM(msg) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        
        const isOwn = msg.user_id === currentUser.id;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
        
        if (!isOwn) {
            const senderSpan = document.createElement('div');
            senderSpan.className = 'message-sender';
            senderSpan.innerText = msg.user_name || 'User';
            msgDiv.appendChild(senderSpan);
        }
        
        const textSpan = document.createElement('div');
        textSpan.innerText = msg.content;
        msgDiv.appendChild(textSpan);
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = formatTime(msg.created_at);
        msgDiv.appendChild(timeSpan);
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMessage(chatId) {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;
        
        const { error } = await supabase.from('messages').insert({
            chat_id: chatId,
            user_id: currentUser.id,
            user_name: currentUser.email?.split('@')[0],
            content: content,
            created_at: new Date().toISOString()
        });
        
        if (!error) {
            input.value = '';
            await loadMessages(chatId);
            logDebug('Сообщение отправлено');
        } else {
            alert('Ошибка: ' + error.message);
        }
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    function renderAuth() {
        authSection.classList.remove('hide');
        feedSection.classList.add('hide');
        messengerSection.classList.add('hide');
        userHeaderInfo.innerHTML = '';
        
        authSection.innerHTML = `
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active">Вход</button>
                    <button class="auth-tab">Регистрация</button>
                </div>
                <input type="email" id="authEmail" class="auth-input" placeholder="Email">
                <input type="password" id="authPassword" class="auth-input" placeholder="Пароль (мин 6 символов)">
                <button id="authSubmitBtn" class="auth-btn">Войти</button>
                <div id="authError" class="error-msg"></div>
            </div>
        `;
        
        const loginTab = authSection.querySelector('.auth-tab');
        const regTab = authSection.querySelectorAll('.auth-tab')[1];
        const emailInput = document.getElementById('authEmail');
        const passInput = document.getElementById('authPassword');
        const submitBtn = document.getElementById('authSubmitBtn');
        const errorMsg = document.getElementById('authError');
        
        let isLogin = true;
        
        loginTab.onclick = () => {
            loginTab.classList.add('active');
            regTab.classList.remove('active');
            submitBtn.innerText = 'Войти';
            isLogin = true;
            errorMsg.innerText = '';
        };
        
        regTab.onclick = () => {
            regTab.classList.add('active');
            loginTab.classList.remove('active');
            submitBtn.innerText = 'Зарегистрироваться';
            isLogin = false;
            errorMsg.innerText = '';
        };
        
        submitBtn.onclick = async () => {
            const email = emailInput.value.trim();
            const password = passInput.value;
            if (!email || !password) {
                errorMsg.innerText = 'Заполните все поля';
                return;
            }
            if (!isLogin && password.length < 6) {
                errorMsg.innerText = 'Пароль должен быть не менее 6 символов';
                return;
            }
            
            try {
                if (!isLogin) {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    errorMsg.style.color = '#06a06b';
                    errorMsg.innerText = '✅ Регистрация успешна! Теперь войдите.';
                    emailInput.value = '';
                    passInput.value = '';
                    loginTab.click();
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    await checkUser();
                }
            } catch (err) {
                errorMsg.style.color = '#c2412c';
                errorMsg.innerText = err.message;
            }
        };
    }
    
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            userHeaderInfo.innerHTML = `<button id="logoutBtn" class="logout-btn">Выйти</button>`;
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await supabase.auth.signOut();
                currentUser = null;
                renderAuth();
            });
            authSection.classList.add('hide');
            feedSection.classList.remove('hide');
            messengerSection.classList.add('hide');
            logDebug('Пользователь вошёл: ' + user.email);
            await loadFeed();
        } else {
            renderAuth();
        }
    }
    
    supabase.auth.onAuthStateChange(async (event) => {
        if (event === 'SIGNED_IN') await checkUser();
        else if (event === 'SIGNED_OUT') { currentUser = null; renderAuth(); }
    });
    
    checkUser();
})();
</script>
<footer class="container">RuEncryp · Лента + Мессенджер</footer>
</body>
</html>
